    <title>{% if IS_DEV %}DEV | {% endif %}{% block title %}TravelPinHunt{% endblock %}</title>

    <meta property="og:image:width" content="900">
    <meta property="og:image:height" content="900">

    // Для белых цветов добавляет тень чтобы текст был виден на белом фоне
    function applyFlag(flag) {
        const shadow = "0 1px 3px rgba(0,0,0,0.3)";
        ['t', 'p', 'h'].forEach((part, index) => {
            setTimeout(() => {
                const el = document.querySelector('.logo-' + part);
                el.style.color = flag[part];
                el.style.textShadow = (flag[part] === '#FFFFFF' || flag[part] === '#F0F0F0') ? shadow : '';
            }, index * 80); // волна: 0ms → 80ms → 160ms
        });
    }

    document.addEventListener('DOMContentLoaded', function() {
        let lastIndex = -1;

        // Применяет флаг мгновенно, без анимации (для первоначальной загрузки)
        function applyFlagInstant(flag) {
            const shadow = "0 1px 3px rgba(0,0,0,0.3)";
            ['t', 'p', 'h'].forEach(part => {
                const el = document.querySelector('.logo-' + part);
                el.style.transition = 'none';
                el.style.color = flag[part];
                el.style.textShadow = (flag[part] === '#FFFFFF' || flag[part] === '#F0F0F0') ? shadow : '';
            });
            // Возвращаем transition после применения цвета
            setTimeout(() => {
                ['t', 'p', 'h'].forEach(part => {
                    document.querySelector('.logo-' + part).style.transition = '';
                });
            }, 50);
        }

        function nextFlag() {
            let index;
            do {
                index = Math.floor(Math.random() * flags.length);
            } while (index === lastIndex);
            lastIndex = index;
            applyFlag(flags[index]);
        }

        // Если открыта страница страны — показать её флаг и не менять
        if (pageCountry) {
            const countryFlag = flagCatalog.find(f => f.name === pageCountry);
            if (countryFlag) {
                applyFlagInstant(countryFlag);
                return; // не запускаем setInterval
            }
        }

        // На остальных страницах менять каждые 4 секунды
        applyFlagInstant(flags[Math.floor(Math.random() * flags.length)]);
        lastIndex = -1;
        setInterval(nextFlag, 4000);
    });

<body class="bg-gray-50 text-gray-900 min-h-screen">
    <header class="bg-white border-b border-gray-200 py-3 sticky top-0 z-50">
        <div class="flex items-center justify-between max-w-4xl mx-auto px-6">
            <a href="/" class="logo-link text-2xl sm:text-2xl font-bold tracking-tight whitespace-nowrap leading-none flex items-center">
                <span class="logo-t logo-text text-amber-800">Travel</span><span class="logo-p logo-text text-amber-800">Pin</span><span class="logo-h logo-text text-amber-800">Hunt</span>
                <!-- Бейдж "DEV" — виден только когда DEBUG=True (локальная разработка), в проде на Railway DEBUG=False -->
                {% if IS_DEV %}
                    <span class="ml-2 text-[10px] font-bold uppercase tracking-wider bg-red-600 text-white px-1.5 py-0.5 rounded">Dev</span>
                {% endif %}
            </a>
            <nav class="flex gap-4 sm:gap-6 text-sm text-gray-600 items-center ml-3">
                <a href="/about/" class="text-amber-700 hover:text-amber-800 font-bold transition">About</a>
                <a href="/submit/" class="bg-amber-800 text-white px-2 py-1.5 sm:px-4 sm:py-2 rounded-lg hover:bg-amber-900 transition font-bold text-xs sm:text-sm whitespace-nowrap">
                    <span class="sm:hidden">+ Submit</span>
                    <span class="hidden sm:inline">+ Submit location</span>
                </a>
            </nav>
        </div>
    </header>

    <main class="max-w-4xl mx-auto px-6 py-8">
        {% block content %}
        {% endblock %}
    </main>

    <footer class="border-t border-gray-200 mt-5 py-6">
    <div class="max-w-4xl mx-auto px-6 flex items-center justify-between text-sm text-amber-700">
        <span class="text-sm text-amber-700">Made while travelling 🌍✈️👨🏼‍💻</span>
        <span>© 2026</span>
    </div>
</footer>
</body>
</html>
