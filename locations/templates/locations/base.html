<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}TravelPinHunt{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📍</text></svg>">
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen">
    <header class="bg-white border-b border-gray-200 px-6 py-4">
        <div class="flex items-center justify-between max-w-4xl mx-auto px-6">
            <a href="/" class="text-xl font-bold tracking-tight text-amber-800">TravelPinHunt 📍</a>
            <nav class="flex gap-6 text-sm text-gray-600 items-center">
                <a href="/about/" class="text-amber-700 hover:text-amber-800 font-bold transition">About</a>
                <a href="/submit/" class="bg-amber-800 text-white px-4 py-2 rounded-lg hover:bg-amber-900 transition font-bold">
                    + Submit location
                </a>
            </nav>
        </div>
    </header>

    <main class="max-w-4xl mx-auto px-6 py-10">
        {% block content %}
        {% endblock %}
    </main>

    <footer class="border-t border-gray-200 mt-16 py-6">
    <div class="max-w-4xl mx-auto px-6 flex items-center justify-between text-sm text-gray-400">
        <span class="font-medium text-amber-800">Made while travelling 🌍</span>
        <span>© 2026</span>
    </div>
</footer>
</body>
</html>
