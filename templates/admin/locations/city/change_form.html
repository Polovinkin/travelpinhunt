{% extends "admin/change_form.html" %}

<!-- Шаблон формы City. Отличия от стандартной формы — три JSON-мэппинга:
     - {country_id: flag_emoji} читает static/admin_country_flag.js, чтобы рисовать
       флаг выбранной страны рядом с полем Country.
     - {country_id: true} и {country_id: [{id, name}, ...]} читает
       static/admin_city_state.js, чтобы показывать/скрывать и заполнять поле State
       только для стран с has_states=True (например США). -->

{% block field_sets %}
<script id="country-flags-data" type="application/json">{{ country_flags_json|safe }}</script>
<script id="country-has-states-data" type="application/json">{{ country_has_states_json|safe }}</script>
<script id="states-by-country-data" type="application/json">{{ states_by_country_json|safe }}</script>
{{ block.super }}
{% endblock field_sets %}
